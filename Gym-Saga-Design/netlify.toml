[build]
  command = "pnpm --filter @workspace/profeandres run build"
  publish = "artifacts/profeandres/static-build"

[build.environment]
  NODE_VERSION = "24"
  # This matches the domain in app.json and will be used by build.js
  EXPO_PUBLIC_DOMAIN = "profeandres.netlify.app"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
