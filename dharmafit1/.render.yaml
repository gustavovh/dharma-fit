services:
  - type: web
    name: dharmafit-api-server
    env: docker
    dockerfilePath: artifacts/api-server/Dockerfile
    autoDeploy: true
    healthCheckPath: /api/healthz
    envVars:
      - key: PORT
        value: "3001"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: ""
      - key: JWT_SECRET
        value: ""
      - key: JWT_EXPIRY
        value: "15m"
      - key: REFRESH_TOKEN_EXPIRY
        value: "7d"
      - key: CORS_ORIGIN
        value: ""
